<style>
:root { --bg:#f7f7fb; --card:#fff; --ink:#12131a; --muted:#6e7480; --line:#e8e9ef; --accent:#3c5cff; --soft:#eef2ff; }
* { box-sizing:border-box; }
body { margin:0; font-family:-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Noto Sans KR",Segoe UI,sans-serif; background:var(--bg); color:var(--ink); }
.hero { position:relative; padding:14px 14px 10px; background:linear-gradient(180deg,#ffffff 0%,#f7f7fb 100%); }
.hero img { width:100%; max-height:220px; object-fit:cover; border-radius:24px; display:block; background:#ddd; box-shadow:0 12px 30px rgba(0,0,0,.10); }
.hero h1 { margin:16px 4px 12px; font-size:24px; line-height:1.25; letter-spacing:-.04em; }
.searchWrap { position:sticky; top:0; z-index:50; background:rgba(247,247,251,.92); backdrop-filter:blur(10px); padding:8px 14px 10px; border-bottom:1px solid var(--line); }
.search { width:100%; border:1px solid var(--line); background:#fff; border-radius:16px; padding:13px 14px; font-size:15px; outline:none; }
.tabs { display:flex; gap:8px; overflow-x:auto; padding:10px 14px 12px; -webkit-overflow-scrolling:touch; scrollbar-width:none; }
.tabs::-webkit-scrollbar { display:none; }
.tab { flex:0 0 auto; border:1px solid var(--line); background:#fff; color:#333; border-radius:999px; padding:10px 13px; font-weight:700; font-size:13px; white-space:nowrap; }
.tab.active { background:var(--accent); color:#fff; border-color:var(--accent); box-shadow:0 8px 18px rgba(60,92,255,.25); }
.count { margin:0 14px 8px; color:var(--muted); font-size:13px; }
.grid { display:grid; grid-template-columns:repeat(2, minmax(0,1fr)); gap:12px; padding:0 14px 28px; }
.card { background:var(--card); border:1px solid var(--line); border-radius:20px; overflow:hidden; box-shadow:0 6px 18px rgba(22,25,37,.05); }
.thumb { width:100%; aspect-ratio:1/1; background:linear-gradient(135deg,#e8ebff,#fff); display:flex; align-items:center; justify-content:center; overflow:hidden; }
.thumb img, .thumb video { width:100%; height:100%; object-fit:cover; display:block; }
.placeholder { padding:10px; text-align:center; color:#5a6170; font-size:12px; word-break:break-all; }
.body { padding:10px; }
.badge { display:inline-block; font-size:11px; font-weight:800; color:var(--accent); background:var(--soft); padding:4px 7px; border-radius:999px; margin-bottom:6px; }
.title { font-weight:800; font-size:13px; line-height:1.35; letter-spacing:-.03em; margin-bottom:7px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
.promptPreview { font-size:12px; line-height:1.45; color:#3f4652; white-space:pre-wrap; max-height:88px; overflow:hidden; border-top:1px dashed var(--line); padding-top:7px; }
.actions { display:grid; grid-template-columns:1fr 1fr; gap:6px; padding:0 10px 10px; }
button, .download { border:0; background:#f1f3f7; color:#20242c; border-radius:12px; padding:9px 6px; font-size:11px; font-weight:800; text-align:center; text-decoration:none; cursor:pointer; }
button.primary { background:#111827; color:#fff; }
button.blue { background:var(--accent); color:#fff; }
.modal { position:fixed; inset:0; z-index:100; display:none; background:rgba(0,0,0,.55); }
.modal.open { display:block; }
.sheet { position:absolute; inset:auto 0 0 0; max-height:92vh; overflow:auto; background:#fff; border-radius:26px 26px 0 0; padding:14px; box-shadow:0 -10px 40px rgba(0,0,0,.25); }
.close { position:sticky; top:0; z-index:2; float:right; width:38px; height:38px; border-radius:999px; background:#111827; color:#fff; font-size:18px; }
.detailMedia { width:100%; border-radius:20px; overflow:hidden; background:#eef2ff; margin-top:8px; }
.detailMedia img, .detailMedia video { width:100%; max-height:60vh; object-fit:contain; display:block; background:#f5f5f7; }
.detailTitle { font-size:20px; line-height:1.3; letter-spacing:-.04em; margin:12px 2px 8px; font-weight:900; }
.detailPrompt { white-space:pre-wrap; word-break:break-word; line-height:1.65; font-size:14px; background:#f8f9fb; border:1px solid var(--line); border-radius:18px; padding:14px; margin:12px 0 18px; }
.detailActions { display:grid; grid-template-columns:1fr 1fr; gap:8px; position:sticky; bottom:0; background:linear-gradient(180deg,rgba(255,255,255,.82),#fff); padding:10px 0 6px; }
.toast { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); background:#111827; color:#fff; padding:10px 14px; border-radius:999px; font-size:13px; opacity:0; pointer-events:none; transition:.25s; z-index:200; }
.toast.show { opacity:1; bottom:34px; }
@media (min-width:720px) { .page { max-width:760px; margin:0 auto; } .grid { grid-template-columns:repeat(3,1fr); } .sheet { left:50%; transform:translateX(-50%); max-width:760px; border-radius:26px 26px 0 0; } }
</style>

<script>
const categories = ["전체보기", "지쿱AI대학교 1주차", "지쿱AI대학교 2주차", "지쿱AI대학교 3주차", "지쿱AI대학교 4주차", "지쿱AI대학교 일일과제 링크"];
const items = [{"category": "지쿱AI대학교 1주차", "media": "images/1-1.jpg", "title": "귀여운 골든 리트리버 강아지", "prompt": "귀여운 골든 리트리버 강아지, 힙합 스타일의 빨간색 털모자와 선글라스, 카메라를 정면으로 응시, 매우 사실적인 4K 사진 스타일", "kind": "image"}, {"category": "지쿱AI대학교 1주차", "media": "images/1-2.jpg", "title": "CEO/전문가 링크드인 프로필 사진", "prompt": "깔끔한 정장 차림의 CEO/전문가, 배경은 모던한 공유 오피스, 신뢰감을 주는 미소와 조명, 링크드인 프로필 사진 스타일", "kind": "image"}, {"category": "지쿱AI대학교 1주차", "media": "images/1-3.jpeg", "title": "에펠탑 노천 카페 배경 변경", "prompt": "인물은 그대로 유지하고 배경만 바꿔줘. 프랑스 파리의 에펠탑이 보이는 노천 카페, 따뜻한 햇살과 여유로운 분위기, 여행 인플루언서 사진 스타일", "kind": "image"}, {"category": "지쿱AI대학교 1주차", "media": "images/1-4.jpeg", "title": "가을 거리 패션 화보 의상 변경", "prompt": "얼굴은 유지하고 옷만 바꿔줘, 최신 트렌드의 오버핏 코트와 머플러, 가을 거리의 패션 화보 느낌, 세련되고 도시적인 분위기", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-1.jpg", "title": "영화 같은 흑백 초상화", "prompt": "내 실제 얼굴을 그대로 유지한 영화 같은 흑백 초상화. 나는 매끄러운 벽에 편안하게 기대어 옆모습을 보이고 있다. 나의 자세는 편안하면서도 우아하다. 머리는 살짝 뒤로 젖혀져 있고, 턱은 들려 있으며, 눈은 고요한 성찰의 순간에 감겨 있다. 왼팔은 자연스럽게 늘어져 있고, 오른팔은 부드럽게 구부러져 허리춤에 투명한 유리잔을 들고 있다.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-2.jpg", "title": "초실사 8K 3x3 비즈니스 수트 그리드", "prompt": "업로드된 사진과 100% 동일한 얼굴 정체성을 사용하여 같은 인물의 초실사 8K 인물 사진 9장을 생성하세요. 이를 3x3 그리드(세로 비율)로 배열하고, 각 이미지 속 인물은 서로 다른 색상의 비즈니스 수트(단색과 체크무늬 혼합)를 착용해야 합니다. 각 장면은 고유한 포즈, 몸짓, 그리고 배경 색조를 갖추어야 합니다..", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-3.jpg", "title": "GCOOP 간판 스튜디오 전신 화보", "prompt": "[핵심 피사체 및 구도]\n\n업로드된 이미지 속 인물의 하이퍼 리얼리스틱(초실사) 전신 인물 사진입니다. 인물은 '앉아 있는' 자세를 취하고 있습니다. 그 옆에는 지면에 단단히 고정된 세로형 대형 GCOOP 간판이 서 있으며, 세련된 미적 감각을 위해 약간 기울어져 있습니다. 이 오브젝트는 대략 인물의 팔 높이 정도여서, 한쪽 팔을 자연스럽게 얹어 기댈 수 있는 높이입니다. 반대쪽 손에는 **'컵'**을 들고 있습니다.\n\n[카메라 및 조명 설정]\n\n\n\n카메라: 풀프레임 DSLR 카메라 시뮬레이션, 얕은 심도(아웃포커싱)가 적용된 선명한 이미지.\n\n배경: 부드럽고 영화적인 조명이 얼굴과 어깨를 자연스럽게 감싸며 섬세한 그림자와 깊이감을 만드는 미니멀한 파스텔 블루 스튜디오.\n\n[디테일 및 의상]\n\n\n\n의상: 인물은 빨간색 스트리트 웨어 후드티, 검은색 바지, 흰색 신발을 착용하고 있습니다.\n\n질감: 옷감, 피부, 머리카락, 그리고 오브젝트 표면의 질감이 극도로 상세하게 표현되어야 합니다.\n\n[전체적인 스타일]\n\n깨끗하고 미니멀하며 현대적이고 시각적으로 강렬한 렌더링 스타일입니다. CGI 느낌이 아닌, 전문적인 패션 화보처럼 보여야 합니다.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-4.jpg", "title": "피카츄 꼬부기와 함께하는 하이엔드 화보 프롬프트", "prompt": "피카츄 꼬부기와 함께하는 하이엔드 화보 프롬프트\n\n\n핵심 컨셉:\n첨부한 이미지의 원래 얼굴을 완벽하게 보존하며 스타일화나 변형이 전혀 없는 하이퍼 리얼리스틱 포토리얼리스틱 이미지.\n\n\n모델 및 의상:\n\n\n인물: 자신감 넘치는 표정의 인물. 생동감 있고 밝은 에너지를 풍기며 꼬부기와 장난스럽게 상호작용함.\n의상: 무광 블랙의 고급스러운 선글라스, 풍부한 짜임이 돋보이는 꼬부기와 같은 하늘색 톤의 니트 스웨터, 깔끔한 핏의 블랙 하이웨이스트 청바지, 블랙 & 화이트 하이탑 스니커즈 착용.\n디테일: 선글라스에 은은한 스튜디오 반사광이 맺혀 있으며 전체적인 룩에 자연스럽게 어우러짐.\n피카츄 묘사:\n\n\n거대한 3D 포토리얼리스틱 꼬부기. 사실적인 털의 질감과 부드러운 조명이 적용됨.\n인물의 팔 아래에서 활기차고 쾌활한 모습으로 인물을 올려다보며 미소 짓고 있음.\n배경 및 기술 사양:\n\n\n배경: 매끄러운 그라데이션과 깊이감이 느껴지는 선명한 꼬부기 칼라 스튜디오 배경.\n마무리: 대담하고 즐거운 분위기의 하이엔드 잡지 화보(Editorial) 스타일. 날카로운 초점과 자연스러운 색상 균형.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-5.jpg", "title": "로우 앵글 지쿱 AI 대학교 맨투맨 인물 사진", "prompt": "\"50mm 렌즈로 촬영한 시네마틱한 로우 앵글 인물 사진입니다. 업로드된 얼굴을 참조한 인물 피사체를 아래에서 위로 올려다보는 구도이며, 인물은 양팔을 올린 채 낡은 콘크리트와 금속 난간에 자연스럽게 기대어 있습니다. 피사체는 햇살을 받은 듯한 하이라이트가 있는 짧은 흑발을 가졌으며, 헐렁하게 떨어지는 오버사이즈의 질감 있는 베이지색 긴소매 크루넥 맨투맨을 입고 있습니다. 맨투맨에는 검정색 글씨로 \"지쿱 AI 대학교 입학하세요'라고 크게 씌어 있습니다. 인물은 사색적인 표정으로 오른쪽 상단을 응시하고 있으며, 턱선 아래에 부드러운 그림자를 만들고 피부의 질감을 강조하는 부드럽고 따뜻한 자연광을 받고 있습니다. 구도상 오른쪽에는 구조물의 강한 전경 흐림(보케) 처리가 되어 있어 깊이감을 더하고 피사체를 돋보이게 합니다. 배경은 광활하고 짙은 청록색(Teal-Cyan) 하늘로 채워져 있어, 아날로그 필름 사진의 전형적인 특징인 인상적인 '틸 앤 오렌지(Teal and Orange)' 색감을 연출합니다.\"", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-6.jpg", "title": "컴팩트 캐논 디지털 카메라 화면 클로즈업", "prompt": "컴팩트한 캐논 디지털 카메라 화면에 표시된 첨부한 이미지의 인물 클로즈업 샷입니다. 카메라 바디의 버튼, 다이얼, 질감이 화면 속 이미지와 함께 보입니다. 화면 속 사진은 밤에 실내에서 촬영된 것으로, 밝은 내장 플래시가 얼굴과 머리카락에 강한 하이라이트를 만들어냅니다.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-7.jpg", "title": "극사실 메인 주인공과 치비 미니어처", "prompt": "극사실적인 메인 주인공 주변에, 그와 동일한 이목구비, 헤어스타일, 신체 비율, 의상을 가진 귀여운 3D 스타일의 치비(Chibi) 미니어처 여러 명이 둘러싸고 있습니다.\n이 치비 캐릭터들은 주인공 주변에 자연스럽게 배치되어 있으며, 주인공 또는 주변 요소들과 매력적이고 방해되지 않는 방식으로 장난스럽게 상호작용하고 있습니다.\n이미지 위에는 생동감 넘치는 손그림 낙서(Doodle) 효과가 겹쳐져 있습니다: 주인공 주변의 부드러운 흰색 테두리, 반짝이는 효과, 하트 낙서, 작은 꽃, 스마일 아이콘, 그리고 \"shine\", \"bright night\", \"happy vibes\"와 같은 떠다니는 흰색 손글씨 문구들이 포함됩니다.\n전체적인 스타일은 하이퍼 리얼리스틱 사진과 알록달록하고 부드러운 카툰 일러스트레이션이 자연스럽게 조화를 이룹니다.\n단, 메인 주인공의 원래 얼굴, 체형 및 비율은 수정 없이 그대로 유지합니다.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-8-1.jpg", "title": "남자 빈티지 밤 차 창밖 사진", "prompt": "남자\n\n어둡고 몽환적이며 빈티지한 느낌의 바람 부는 밤, 차 창밖으로 등을 기대고 있는 저의 사진을 만들어 주세요. 흰색 와이셔츠 상의를 입고 머리 스타일은 유지해주세요! 얼굴의 세부 사항을 정확하게 유지해 주세요. 얼굴 특징을 변형하지 말고 머리 위치도 그대로 유지해 주세요", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-8-2.jpg", "title": "여자 빈티지 밤 차 창밖 사진", "prompt": "어둡고 몽환적이며 빈티지한 느낌의 바람 부는 밤, 차 창밖으로 등을 기대고 있는 저의 사진을 만들어 주세요. 오프숄더 스타일의 흰색 니트 상의를 입고 갈색의 긴 웨이브 머리를 하고 있습니다. 얼굴의 세부 사항을 정확하게 유지해 주세요. 얼굴 특징을 변형하지 말고 머리 위치도 그대로 유지해 주세요.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-9.jpg", "title": "화이트 빈티지 셰이즈 롱 하이패션 포트레이트", "prompt": "업로드된 이미지 속 인물이 화이트 빈티지 셰이즈 롱(chaise lounge) 위에 우아하게 앉아 있는 하이패션 스튜디오 포트레이트. 인물의 긴 실루엣의 구조적인 딥 블루 맞춤형 비즈니스 정장을 입고 있습니다. 팔걸이에 한쪽 팔을 얹고 다리를 꼬고 앉아, 차분하면서도 에디토리얼한 표정으로 자신감 있게 포즈를 취하고 있습니다.\n\n배경에는 인물의 얼굴을 각진 다각형(polygonal) 형태로 표현한 대형 흑백 기하학 벽화가 배치되어 있습니다. 미니멀한 스튜디오 설정, 부드럽게 분산된 조명, 깨끗한 화이트 배경, 시네마틱한 그림자, 사실적인 피부 톤, 럭셔리 패션 잡지 스타일, 파인 아트 구성, 미묘한 대비, 초고해상도, 정제되고 시대를 초월한 분위기.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-10.jpg", "title": "화이트 배경 세로형 포스터 콜라주", "prompt": "깨끗하고 순수한 화이트 배경 위에 놓인 세로형 포스터 스타일의 콜라주 디자인.\n\n배경 레이아웃은 3~4개의 가로형 라운드 직사각형이 층층이 쌓인 구조이며, 각 칸에는 동일한 인물의 서로 다른 포즈를 담은 시네마틱한 흑백 포트레이트 사진들이 배치되어 있습니다.\n\n전경(foreground)의 약간 왼쪽에는 동일한 인물이 자신감 넘치는 포즈를 취하고 있는 고화질 컬러 컷아웃(누끼) 이미지가 위치합니다. 전경의 인물은 테두리에 화이트 스티커 스타일의 외곽선이 처리되어 있어, 화이트 캔버스 위에서 명확하게 도드라지는 레이어드 콜라주 효과를 연출합니다.\n\n하이패션 에디토리얼 미학, 깔끔한 구성, 흑백 배경 패널과 컬러 전경 모델 사이의 강렬한 대비. 사실적인 질감, 스튜디오 조명, 초고해상도, 선명한 초점.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-11.jpg", "title": "LOMO LC-A 하이 앵글 패션 광고판", "prompt": "**【참고 사진 인물】**을 기반으로 합니다. 이 작품은 LOMO LC-A 스타일의 고화질 사진입니다. 하이 앵글(High angle shot) 시점을 채택하여, 시선은 첨부 사진 인물에게 집중됩니다.\n\n그녀는 **{argument name=\"服装\" default=\"검은색 긴 트렌치코트\"}**를 입고 있으며, 얼굴과 분위기는 **【참고 사진 인물】**과 완벽하게 일치합니다. 첨부 사진 인물은 바닥을 가득 메운 수많은 흑백 패션 광고판 위에 서 있습니다.\n\n하이 앵글 시점 덕분에 바닥에 깔린 모든 광고판 속 모델들 또한 시선은 첨부 사진 인물. 자신의 각기 다른 패션 화보임을 알 수 있으며, 마치 시선은 첨부 사진 인물이 자신의 수많은 분신들 위에 서 있는 듯한 신비로운 느낌을 줍니다.", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-12.jpg", "title": "미니멀리스트 종이 조각 포스터", "prompt": "```json\n{\n  \"prompt\": \"어깨 위에서 [Character Name]의 초상을 묘사한 영화 스타일의 미니멀리스트 색상 포스터. 얼굴은 간단한 그리드에 배열된 적은 수의 큰 정사각형 종이 조각으로 재현됩니다 [약 4x5 또는 5x6 조각]. 각 종이 조각은 얼굴의 별개의 부분을 포함하고 있으며, 함께 완전한 초상을 형성합니다. 얼굴을 구성하는 내부 종이 조각들은 완벽하게 평평하지 않으며, 많은 조각들이 약간 말린 가장자리와 들린 모서리를 가지고 있어, 작은 사실적인 그림자를 드리워 3차원적이고 붙여진 듯한 외관을 제공합니다. 이 네 개의 정사각형 중에는 피부/이미지 위에 직접 나타나는 미세한 검은색 손글씨 노트 [text1, text2, text3, text4]가 있습니다. 이 중앙 그리드의 외곽에는 여러 스티커 [Sticker Color]가 다양한 임의의 위치(모서리에 한정되지 않음)에 부착되어 있으며, 손글씨로 된 [Outer Text, e.g., iconic quotes]를 포함하고 있습니다. 전체 구성은 약간 불규칙하며, 조각들 사이에 보이는 간격이 있어 배경에 콘크리트 벽 [Color]가 드러납니다. 작품 전반에 걸쳐 사실적인 종이 질감이 있으며, 들린 가장자리를 강조하는 고품질 스튜디오 조명과 잉크 및 종이 결에 대한 선명한 초점이 특징입니다.\"\n}\n```", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-13.jpg", "title": "예술가 스튜디오 드래곤 판타지", "prompt": "\"아늑한 예술가 스튜디오 안의 영화 같은 판타지 장면. 페인트 얼룩이 있는 앞치마를 입은 첨부한 이미지의 인물이 이젤에 앉아, 공중에 붓을 들고 캔버스를 차분하게 바라보고 있다. 캔버스에서 웅장한 동양 스타일의 드래곤이 3차원으로 나타나며, 그 비늘은 깊은 청록색과 파란색으로 칠해져 있고, 갈기와 머리 주위에는 흐르는 불타는 주황색 불꽃이 있으며, 연기가 위로 감돌고 있다. 드래곤은 살아 있는 듯하면서도 예술적으로 보이며, 붓 터치와 페인트로 형성된 것처럼 보인다. 부드러운 자연광이 얇은 커튼이 있는 창문을 통해 들어와 나무 작업 공간에 흩어져 있는 붓, 페인트, 예술 용품이 비춰진다. 따뜻하고 사실적인 조명, 얕은 심도, 초고해상도 질감, 마법적 사실주의, 판타지 사실주의 스타일, 8k 품질, 매우 세밀한 묘사, 영화 같은 구성, 부드러운 색 보정, 기발하면서도 평화로운 분위기.\"", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-14.jpg", "title": "뉴욕 타임스 스퀘어 하이패션 화보", "prompt": "\"고급 패션 잡지 화보, 첨부한 이미지의 인물이 서서 카메라를 똑바로 바라보며, 화면 중앙에서 약간 고개를 돌리고, 주변에는 뉴욕 타임스 스퀘어를 빠르게 지나가는 흐릿한 인물 실루엣이 있습니다. 인물의 표정은 차분하고 냉철하며, 검은색 미니멀리즘 의상을 입고 있습니다. 배경은 타임스 스퀘어의 활기찬 조명과 광고판을 보여주며, 약간 추상적이고 밝아 그녀의 정지된 존재와 동적 흐림 사이의 대비를 강조합니다. 편집 스타일, 영화적 구도, 순수 예술 사진, 부드러운 잡지 질감, 고해상도.\"", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-15.jpg", "title": "광각 로우 앵글 음료수 병 광고 사진", "prompt": "\"전문 사진, 첨부한 이미지의 인물이 모델(참고 이미지), 카메라를 정면으로 바라보며, 아래에서 위로 촬영, 광각 렌즈 사용. 남성이 몸을 기울이며 가까이에서 카메라에 음료수 병을 보여주고, 한 손으로 병을 잡고 카메라 앞에 밀착. 병의 라벨과 방향이 곧게 유지되어 라벨이 선명하게 읽히도록. 그는 흰색 운동화를 신고 있으며, 한 발이 카메라 앞에 있음. 남성이 거리에서 서 있고, 젖은 아스팔트와 튀는 물방울이 아래에서 촬영됨. 선명한 색상, 영화 같은 조명, 빛이 뒤에서 모델의 얼굴에 비침. --v7 --ar 3:4 --style raw\"", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-16.jpg", "title": "인생 여정 영화급 콜라주", "prompt": "\"강력한 영화급 콜라주로, 한 프레임 안에서 첨부한 이미지 인물의 완전한 인생 여정을 이야기합니다.\n이야기는 가장 왼쪽에서 시작되며, 부드럽게 빛나는 흑백 초음파 스캔 이미지가 미리 태어난 아기를 보여줍니다. 중앙으로 부드럽게 전환되며, 콜라주는 인생 단계들을 순차적으로 보여줍니다: 병원 천에 싸인 신생아, 비틀거리며 걷는 유아, 책가방을 멘 초등학생, 꿈으로 가득 찬 인물, 자신감 있게 일하는 젊은 인물, 힘과 지혜가 넘치는 성숙한 인물.\n가장 오른쪽에서 이야기는 인물의 노인 모습이 창가에 평화롭게 앉아 있는 모습으로 끝납니다. 은발이 따뜻한 석양 속에서 빛나며, 완성과 회상을 상징합니다.\n각 단계는 찢어진 종이 가장자리, 누출된 빛, 부드러운 운동 궤적, 떠오르는 기억, 시계 요소와 미세한 시간선으로 매끄럽게 연결됩니다.\n색상 그레이딩은 차가운 단색(출생)에서 생생한 따뜻한 톤(청춘)으로 전환되며, 결국 금빛 부드러운 색조(노년)로 귀결됩니다.\n극한의 감정, 시적, 영화적 서사, 얕은 심도, 실제 인물의 표정, 고세부 콜라주 구성, 상징적인 인생 여정, 영원하고 고무적인", "kind": "image"}, {"category": "지쿱AI대학교 2주차", "media": "images/2-17.jpg", "title": "불타는 신문과 담배 클로즈업", "prompt": "```json\n{\n\"prompt\": \"기반 <사용자 첨부 이미지>, 첨부한 사진의 인물, 약간 헝클어진 머리, 입에 담배를 물고 아래에서 불꽃을 통해 바라보는 모습. 헝클어진 머리는 자연스럽게 약간의 웨이브가 있으며, 약간 헝클어졌지만 거칠지 않음—힘들이지 않은 헝클임, 생활감 있는 질감. 불꽃을 통해 아래를 바라보며 카메라를 응시하는 반쯤 감긴 눈빛. 냉담하고, 초연하며, 무관심한 표정, 담배는 입술에서 늘어져 있다. 타오르는 신문을 손에 들고 있으며, 하반신 얼굴만 보임—턱, 입술, 담배와 턱이 불꽃을 통해 보인다.\n\n검은색 정장 재킷, 어두운 정장. 《뉴욕 타임스》 신문이 앞에 있으며, 신문의 하단 가장자리와 불꽃이 극단적인 전경에 위치하고, 불꽃이 위로 타오르고 있다.\n\n전경 요소—카메라가 불꽃을 통과하여 촬영하며, 불꽃 부분이 주체의 하반신 얼굴 시야를 가리고 프레임을 형성한다. 불꽃은 카메라와 주체의 얼굴 사이에 위치하며, 카메라 앞에서 불꽃이 솟아오른다. 따뜻한 주황색과 금색의 불꽃, 전경은 약간 초점이 흐릿하다. 불꽃은 자연스러운 흐림/프레임을 형성하며, 관람자는 불꽃을 통해 턱, 입술, 담배를 볼 수 있다. 담배는 입술에서 늘어져 있고, 점화되어 있으며, 불꽃을 통해 보이고, 연기와 불빛이 섞인다.\n\n전경 불꽃을 통한 하반신 얼굴 클로즈업, 35m items.forEach((it, i)=>{ it.id = i; it.no = (it.media.match(/images\/([^/.]+)/)||['',''])[1]; });
let current = '전체보기';
let query = '';
const grid = document.getElementById('grid');
const tabs = document.getElementById('tabs');
const count = document.getElementById('count');
const search = document.getElementById('search');

function toast(msg){ const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1400); }
function mediaHTML(it, detail=false){
  const cls = detail ? 'detailMedia' : 'thumb';
  if(it.kind==='video') return `<div class="${cls}"><video src="${it.media}" controls playsinline muted onerror="this.outerHTML='<div class=&quot;placeholder&quot;>${it.media}</div>'"></video></div>`;
  return `<div class="${cls}"><img src="${it.media}" alt="${it.no} ${escapeHtml(it.title)}" loading="lazy" onerror="this.outerHTML='<div class=&quot;placeholder&quot;>${it.media}</div>'"></div>`;
}
function escapeHtml(s){ return String(s).replace(/[&<>"']/g, m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function renderTabs(){ tabs.innerHTML = categories.map(c=>`<button class="tab ${c===current?'active':''}" onclick="setCat('${escapeJs(c)}')">${c}</button>`).join(''); }
function escapeJs(s){ return String(s).replace(/'/g, "\\'"); }
function filtered(){ const q=query.trim().toLowerCase(); return items.filter(it => (current==='전체보기'||it.category===current) && (!q || (it.title+' '+it.prompt+' '+it.media+' '+it.no).toLowerCase().includes(q))); }
function render(){ renderTabs(); const list=filtered(); count.textContent = `${list.length}개 프롬프트 표시 중`; grid.innerHTML = list.map(it=>`<article class="card">
  <div onclick="openModal(${it.id})">${mediaHTML(it)}<div class="body"><span class="badge">${it.no}</span><div class="title">${it.no}. ${escapeHtml(it.title)}</div><div class="promptPreview">${escapeHtml(it.prompt)}</div></div></div>
  <div class="actions"><a class="download" href="${it.media}" download>이미지/영상 저장</a><button onclick="shareMedia(${it.id})">미디어 공유</button><button class="primary" onclick="copyPrompt(${it.id})">프롬프트 복사</button><button class="blue" onclick="sharePrompt(${it.id})">프롬프트 공유</button></div>
</article>`).join(''); }
function setCat(c){ current=c; render(); }
search.addEventListener('input', e=>{ query=e.target.value; render(); });
async function copyText(text){ await navigator.clipboard.writeText(text); toast('복사 완료'); }
function copyPrompt(id){ copyText(items[id].prompt); }
function purePromptShareText(it){
  const urls = it.prompt.match(/https?:\/\/[^\s]+/g);
  if (urls && (it.category.includes('링크') || /링크/.test(it.title))) return urls[0];
  return it.prompt;
}
async function sharePrompt(id){ const it=items[id]; const text=purePromptShareText(it); if(navigator.share){ try{ await navigator.share({text}); return; }catch(e){} } await copyText(text); }
async function shareMedia(id){
  const it=items[id];
  try{
    const res = await fetch(it.media); const blob = await res.blob();
    const ext = it.media.split('.').pop(); const file = new File([blob], it.media.split('/').pop(), {type: blob.type || (it.kind==='video'?'video/mp4':'image/'+ext)});
    if(navigator.canShare && navigator.canShare({files:[file]})){ await navigator.share({files:[file]}); return; }
  }catch(e){}
  if(navigator.share){ try{ await navigator.share({url:it.media}); return; }catch(e){} }
  await copyText(it.media);
}
function openModal(id){ const it=items[id]; document.getElementById('detail').innerHTML = `${mediaHTML(it,true)}<h2 class="detailTitle">${it.no}. ${escapeHtml(it.title)}</h2><div class="detailPrompt">${escapeHtml(it.prompt)}</div><div class="detailActions"><a class="download" href="${it.media}" download>이미지/영상 저장</a><button onclick="shareMedia(${it.id})">이미지/영상 공유</button><button class="primary" onclick="copyPrompt(${it.id})">프롬프트 복사하기</button><button class="blue" onclick="sharePrompt(${it.id})">프롬프트 공유하기</button></div>`; document.getElementById('modal').classList.add('open'); document.getElementById('modal').setAttribute('aria-hidden','false'); }
function closeModal(){ document.getElementById('modal').classList.remove('open'); document.getElementById('modal').setAttribute('aria-hidden','true'); }
document.getElementById('modal').addEventListener('click', e=>{ if(e.target.id==='modal') closeModal(); });
render();
</script>
